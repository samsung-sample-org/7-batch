# =============================================================================
# Docker Compose: Spring Batch 배치 애플리케이션 (H2 인메모리 DB 사용)
# H2를 사용하므로 별도 DB 서비스 없이 app 단독으로 구성한다.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 애플리케이션 서비스
  # ---------------------------------------------------------------------------
  app:
    build: .
    container_name: batch-app
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=default
